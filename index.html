document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

measures AI products. Ask away or tap a prompt.\",\n      placeholder: 'Ask about craft: scoping, evals, metrics\u2026',\n      chips: [ { id: 'decisions', text: 'How she makes decisions' }, { id: 'measuring', text: 'Measuring AI success' }, { id: 'evals', text: 'Her eval bar' }, { id: 'tradeoff', text: 'A hard tradeoff' } ] },\n    organizer: { lens: 'Events & podcasts', label: 'Event / podcast', fallback: 'talks',\n      think: ['Gathering her talks & topics', 'Putting it together'],\n      greeting: 'For events & podcasts, here is what she speaks on and where she has been on stage. Ask away or tap a prompt.',\n      placeholder: 'Ask about topics, talks, or availability\u2026',\n      chips: [ { id: 'talks', text: 'Speaking & stage experience' }, { id: 'speaking', text: 'Topics she covers' }, { id: 'impact', text: 'Her best work' }, { id: 'reach', text: 'How to reach her' } ] },\n    writer: { lens: 'Press & writing', label: 'Writer / press', fallback: 'impact',\n      think: ['Gathering her story & numbers', 'Putting it together'],\n      greeting: 'For press & writing, I can share her story, talks, and the numbers behind her work. Ask away or tap a prompt.',\n      placeholder: 'Ask about her story, work, or the numbers\u2026',\n      chips: [ { id: 'impact', text: 'Her best work' }, { id: 'talks', text: 'Speaking & talks' }, { id: 'skills', text: 'Skills & stack' }, { id: 'reach', text: 'How to reach her' } ] },\n    mentee: { lens: 'Students & mentees', label: 'Student / mentee', fallback: 'mentorship',\n      think: ['Gathering her path & advice', 'Putting it together'],\n      greeting: \"For students & mentees, happy to share how she got here, what she'd advise, and how to reach her. Ask away or tap a prompt.\",\n      placeholder: 'Ask about her path, advice, or getting into AI PM\u2026',\n      chips: [ { id: 'mentorship', text: 'Mentorship' }, { id: 'decisions', text: 'How she thinks' }, { id: 'skills', text: 'Skills & stack' }, { id: 'reach', text: 'How to reach her' } ] },\n    general: { lens: 'Open chat', label: 'Open chat', fallback: 'impact',\n      think: ['Looking across her work', 'Putting it together'],\n      greeting: 'Ask me anything about Deepti: her work, how she thinks, or what she is looking for.',\n      placeholder: 'Ask anything about Deepti\u2026',\n      chips: [ { id: 'impact', text: 'Her best work' }, { id: 'skills', text: 'Skills & stack' }, { id: 'open', text: \"What she's looking for\" }, { id: 'decisions', text: 'How she thinks' } ] }\n  };\n\n  BUILDERS = {\n    level: () => ([\n      { isText: true, lead: 'Short answer: a strong Senior, and a credible Staff AI PM.', paras: ['10+ years in product, the last ~4 shipping GenAI and agentic products to millions. She owns scope end to end, blank page to GA.'] },\n      { isMatch: true, verdict: 'Good-to-strong fit \u00b7 Senior / Staff AI PM', rows: [ { k: 'Level', v: 'Senior / Staff AI PM' }, { k: 'Sweet spot', v: 'Agentic & GenAI, 0\u21921' }, { k: 'Availability', v: 'Open now' }, { k: 'Location', v: 'SF Bay \u00b7 hybrid or remote' } ] }\n    ]),\n    skills: () => ([\n      { isText: true, lead: 'The must-haves, at a glance:' },\n      { isSkills: true, groups: [\n        { group: 'AI / ML', items: ['Agentic AI & orchestration', 'LLMs (Claude/GPT/Gemini)', 'RAG & Graph-RAG', 'Evals', 'Token economics'] },\n        { group: 'Product', items: ['0\u21921', 'Monetization', 'GTM', 'Experimentation'] },\n        { group: 'Data', items: ['SQL', 'Python', 'A/B testing', 'Amplitude'] } ] },\n      { isText: true, paras: ['Depth is in agentic AI and GenAI; she pairs it with real monetization and data chops.'] }\n    ]),\n    open: () => ([\n      { isText: true, lead: 'Yes, actively open right now.', paras: ['Looking for Senior / Staff AI PM roles owning agentic or GenAI products 0\u21921. SF Bay, open to hybrid or remote. Happy to connect you with her directly.'] }\n    ]),\n    why: () => ([\n      { isText: true, lead: 'Three reasons she stands out:' },\n      { isText: true, paras: ['1 \u00b7 She ships. Agent Builder went concept \u2192 GA in 3 months.', '2 \u00b7 She moves numbers. +11 pts CSAT and \u221215% contact rate at Intuit scale; +79% MoM revenue at Elastic.', '3 \u00b7 Reach. AI she shipped has touched 100M+ users.'] },\n      { isMatch: true, verdict: 'Proof, at a glance', rows: [ { k: 'Users reached', v: '100M+' }, { k: 'Revenue & pipeline', v: '$50M+' }, { k: 'Concept \u2192 GA', v: '3 months' } ] }\n    ]),\n    impact: () => ([\n      { isText: true, lead: 'Her most impactful product: Intuit Assist.', paras: ['A GenAI financial assistant she shipped to 100M+ customers at Intuit. It lifted CSAT by +11 pts and cut contact rate \u221215% by making in-product help trustworthy and accurate.', 'Want the tradeoffs behind it, or the metrics in full?'] }\n    ]),\n    tradeoff: () => ([\n      { isText: true, lead: 'A representative one: capability vs. cost on Agent Builder.', paras: ['The pull was to ship the widest possible agent. But broad surface area meant flaky behavior and runaway token cost, both fatal for a paid, first-party product.', 'Her call: ship a narrower agent she could stand behind, with token economics designed in, then widen once evals held. It kept trust intact, cut token cost 40%, and revenue still grew +79% MoM, because the thing people can rely on is the thing they pay for.', 'The principle she reuses: at 0\u21921, dependability and unit economics ARE the product, not a follow-up.'] }\n    ]),\n    measuring: () => ([\n      { isText: true, lead: 'She measures AI products on trust and outcomes, not vibes.', paras: ['Leading indicators are eval pass rates and quality gates; lagging indicators are the business: CSAT, contact rate, conversion, revenue and unit cost.', 'Concretely: +11 pts CSAT and \u221215% contact rate on Intuit Assist, +20% conversion on the recommendation engine, and 40% lower token cost on Agent Builder while revenue grew +79% MoM.'] }\n    ]),\n    leading: () => ([\n      { isText: true, lead: 'She leads through clarity and evidence, across functions.', paras: ['She aligns eng, design, data and GTM on one customer problem and a measurable goal, then lets evals and experiments settle debates instead of opinion.', \"She's owned products end to end for teams serving 100M+ customers, and represents the work externally, in C-suite reviews and on conference stages.\"] }\n    ]),\n    decisions: () => ([\n      { isText: true, lead: 'Customer-backward, then let evidence steer.', paras: ['She starts from a real customer problem and a measurable goal, not a feature list. Then she de-risks in order: name the scariest unknown, build the smallest thing that tests it, and let evals and experiments, not opinions, decide what ships.', 'At Intuit that discipline meant safety and accuracy gates on Intuit Assist before scale, which is how it landed +11 pts CSAT and \u221215% contact rate across 100M+ customers instead of shipping generic LLM answers.'] }\n    ]),\n    strategy: () => ([\n      { isText: true, lead: 'She picks bets customer-backward, then de-risks hard.', paras: ['She starts from a real, painful customer problem and a measurable goal, not a feature list, and sequences the scariest unknowns first.', 'At Elastic that meant betting on a first-party agentic product and proving cost and reliability early: concept \u2192 GA in 3 months, +79% MoM revenue.'] }\n    ]),\n    scale: () => ([\n      { isText: true, lead: 'She scales AI by designing for trust and unit cost up front.', paras: ['Safety and accuracy are launch gates, not afterthoughts, and that is how Intuit Assist reached 100M+ customers without eroding trust.', 'And she treats token economics as a first-class metric: Agent Builder shipped 40% cheaper per token while revenue grew +79% MoM.'] }\n    ]),\n    building: () => ([\n      { isText: true, lead: 'She works close to engineering, not above it.', paras: ['She sets a tight GA bar, sequences the riskiest technical unknowns first, and makes weekly evals the shared source of truth so eng is not chasing moving targets.', 'On Agent Builder that partnership took a first-party agentic platform from concept to GA in 3 months.'] }\n    ]),\n    architecture: () => ([\n      { isText: true, lead: 'The agentic calls she made are about trust and cost.', paras: ['She favored a narrower, dependable agent surface for GA over a broad, flaky one, protecting reliability and unit economics, then expanding once evals held.', 'Underneath: RAG and graph-RAG for grounding, evals in the release loop, and token economics designed in, giving 40% lower token cost at GA.'] }\n    ]),\n    evals: () => ([\n      { isText: true, lead: 'Evals are her quality bar, and her tie-breaker.', paras: ['She builds evals into the release process so shipping decisions rest on measured quality, not opinion, with human-in-the-loop review where stakes are high.', 'That discipline is why Intuit Assist could scale to 100M+ customers on a hard accuracy bar.'] }\n    ]),\n    talks: () => ([\n      { isText: true, lead: \"She's comfortable on stage and in the C-suite.\", paras: ['She speaks on agentic AI, shipping GenAI products 0\u21921, and the economics of running AI at scale, from executive reviews to conferences.', 'Happy to line up a topic and format that fits your audience.'] }\n    ]),\n    speaking: () => ([\n      { isText: true, lead: 'Topics she covers well:', paras: ['Agentic AI & orchestration in production \u00b7 Shipping GenAI 0\u21921 \u00b7 Evals, safety & human-in-the-loop \u00b7 Token & unit economics of AI \u00b7 Turning raw AI capability into monetizable products.'] }\n    ]),\n    mentorship: () => ([\n      { isText: true, lead: 'She mentors PMs moving into AI.', paras: ['Practical and craft-focused: how to scope AI products, de-risk with evals, and measure what matters, grounded in shipping to 100M+ users.', 'Reach out and I will pass it along.'] }\n    ]),\n    reach: () => ([\n      { isText: true, lead: 'Easiest ways to reach Deepti:', paras: [\"Use the Email button in the sidebar, or grab her resume there for the full record. Tell me what it's about and I'll make sure it lands with context.\"] }\n    ]),\n    deepAgent: () => ([\n      { isDeep: true, title: 'Agent Builder', tag: 'Elastic \u00b7 Senior PM, Product Lead \u00b7 2025', hasMetrics: true, star: [\n        { label: 'Situation', text: 'Developers wanted to run AI agents over their own data but were stitching brittle tooling together. Elastic needed a first-party, monetizable agentic experience that stayed cost-efficient at scale.' },\n        { label: 'How she led', text: 'Owned it end to end. Set a tight GA bar, sequenced the riskiest unknowns first, cost and reliability, and made weekly evals the source of truth instead of opinion. Designed token economics in early rather than bolting it on.' },\n        { label: 'The tradeoff', text: 'Chose a narrower, dependable agent surface for GA over a broad-but-flaky one, protecting trust and unit cost, then expanded once evals held.' } ],\n        metrics: [ { v: '3 mo', l: 'concept \u2192 GA' }, { v: '+79%', l: 'MoM revenue' }, { v: '40%', l: 'lower token cost' } ] },\n      { isText: true, paras: ['The through-line: at 0\u21921, dependability and unit economics are the product, not a follow-up.'] }\n    ]),\n    deepIntuit: () => ([\n      { isDeep: true, title: 'Intuit Assist', tag: 'Intuit \u00b7 Staff PM \u00b7 2021 to 2025', hasMetrics: true, star: [\n        { label: 'Situation', text: \"100M+ customers needed trustworthy in-product help on complex financial and tax tasks. Generic LLM answers weren't safe or accurate enough, and the business needed to contain support demand.\" },\n        { label: 'How she led', text: 'Treated safety and accuracy as launch gates, not aspirations. Built human-in-the-loop review and evals into the release process, and prioritized the highest-friction tasks first so quality showed up where customers felt it.' },\n        { label: 'Judgment', text: 'Held the accuracy bar under pressure to ship broadly. Narrow-and-trustworthy beats broad-and-risky at that scale.' } ],\n        metrics: [ { v: '100M+', l: 'customers' }, { v: '+11 pts', l: 'CSAT' }, { v: '-15%', l: 'contact rate' } ] }\n    ]),\n    deepNetApp: () => ([\n      { isDeep: true, title: 'Freemium marketplace & AI chatbot', tag: 'NetApp \u00b7 PM, Enterprise e-Commerce \u00b7 2017 to 2021', hasMetrics: true, star: [\n        { label: 'Situation', text: \"Enterprise prospects had no low-friction way to evaluate products, and support couldn't scale, inside a traditionally sales-led org that needed proof self-serve could generate real pipeline.\" },\n        { label: 'How she led', text: 'Quantified a $380M revenue gap to win C-suite funding, built a zero-to-one freemium trial marketplace spanning NetApp and partner products, and wired it into Salesforce so self-serve fed the existing sales motion instead of fighting it. Shipped an AI support chatbot at 95% intent accuracy across 10K daily interactions.' },\n        { label: 'Result', text: '+215% product evaluations, $500M in sales opportunities, $35M+ CRM pipeline, and NPS up 9 points.' } ],\n        metrics: [ { v: '+215%', l: 'evaluations' }, { v: '$500M', l: 'opportunities' }, { v: '+9 pts', l: 'NPS' } ] }\n    ]),\n    jd: () => ([\n      { isVerdict: true, match: 'Strong', matchNote: 'based on the role you shared', matches: ['Agentic AI', 'RAG / evals', '0-to-1 and platform'], evidence: 'Agent Builder and Intuit Assist, with real metrics: concept \u2192 GA in 3 months, +79% MoM revenue, +11 pts CSAT at 100M+ scale.', gap: 'Deep domain-specific / regulated specifics. She ramps fast and gates on safety, but worth confirming live.', ctas: [ { text: 'Deep-dive the closest project', id: 'deepAgent' }, { text: 'Download resume', id: 'resume' } ] }\n    ]),\n    fallback: () => ([\n      { isText: true, lead: 'Happy to help with that.', paras: ['I can talk through her best work, how she thinks, her skills, or what she is looking for, or you can paste a job description for a fit read. Where should we start?'] }\n    ])\n  };\n\n  RESUME_URL = 'https://www.deeptidheer.com/resume.pdf';\n\n  LEAD_PLACEHOLDER = { recruiter: 'The role, level, and timeline\u2026', hm: \"The team and what you're solving\u2026\", exec: 'The mandate and scope\u2026', founder: \"What you're building and the ask\u2026\", engineer: \"What you're building together\u2026\", pmpeer: \"What you'd like to talk through\u2026\", organizer: 'Your event / show and the ask\u2026', writer: 'Your outlet and the angle\u2026', mentee: 'What you\\u2019d like guidance on\u2026', general: \"What's this about?\" };\n\n  CASES = [\n    { company: 'Elastic', role: 'Senior PM, Product Lead', period: '2025 to Present', title: 'Agent Builder: an agentic conversational AI platform', summary: 'Owning vision, strategy and roadmap end-to-end for a brand-new agentic platform.', seed: 'How did she lead Agent Builder to GA?',\n      headline: [{ v: '3 mo', l: 'concept to GA' }, { v: '+79% MoM', l: 'revenue growth' }, { v: '40%', l: 'lower token cost' }],\n      situation: \"Developers wanted to build and run AI agents over their own data but were stitching together brittle tooling. Elastic's goal was to make its platform agent-centric and capture that demand with a first-party, monetizable agentic experience that stayed cost-efficient at scale. She owned the vision, strategy and roadmap from a blank page.\",\n      task: ['Define product vision, strategy and roadmap from scratch', 'Reach GA fast, then first revenue', 'Build pricing & packaging for hosted and pay-as-you-go billing', 'Keep agent token costs sustainable as usage scaled', 'Align 7+ cross-functional teams on one agentic experience'],\n      action: 'She scoped aggressively to reach GA in three months, then prioritized monetization over breadth, shipping hosted and pay-as-you-go billing before chasing every feature. She partnered with engineering to architect a context engine with dynamically loaded skills and selective compaction, cutting token cost rather than just adding capability, and unified 7+ teams into a single agentic experience instead of fragmented per-product agents.',\n      result: [{ v: '3 mo', l: 'concept to GA' }, { v: 'Month 5', l: 'to monetization' }, { v: '+79% MoM', l: 'revenue, early ramp' }, { v: '~53x', l: 'daily active users' }, { v: '~110x', l: 'monthly token usage' }, { v: '40%', l: 'lower token cost' }],\n      learning: \"Shipping monetization early forced clarity on who the product was really for. The biggest unlock wasn't a feature. It was unifying into one agentic experience across teams, turning 7+ roadmaps into a single growth curve.\" },\n    { company: 'Intuit', role: 'Staff PM', period: '2021 to 2025', title: 'Intuit Assist : a GenAI financial assistant at global scale', summary: \"Zero-to-one GenAI growth and support strategy for Intuit's global financial assistant.\", seed: 'Deep-dive Intuit Assist',\n      headline: [{ v: '100M+', l: 'customers' }, { v: '+11 pts', l: 'CSAT' }, { v: '-15%', l: 'contact rate' }],\n      situation: 'More than 100 million customers needed trustworthy, in-product help across complex financial and tax tasks, but generic LLM answers were not safe or accurate enough. The goal was to contain support demand, raise satisfaction and grow revenue without hallucinating in a high-stakes domain.',\n      task: ['Pioneer the zero-to-one GenAI growth and support strategy', 'Lead a 40+ member cross-functional team from ideation to launch', 'Make responses accurate and safe enough to trust in a regulated domain', 'Contain support demand and lift satisfaction', 'Scale across surfaces and business units'],\n      action: 'She treated response quality as the product rather than coverage, enriching models with tax and accounting knowledge through RAG and Graph-RAG, refining intents with AI-safety features like profanity filtering and bias detection, and accepting a slower rollout in exchange for trust. She drove the experience through rigorous A/B/C experimentation and scaled across three business units only after the core proved out.',\n      result: [{ v: '$11M', l: '0-1 launch' }, { v: '+$17M', l: 'scaling to 3 BUs' }, { v: '100M+', l: 'customers' }, { v: '+15%', l: 'resolution (RAG)' }, { v: '-15%', l: 'contact rate' }, { v: '+11 pts', l: 'CSAT' }],\n      learning: 'In a high-stakes domain, safety and quality are the growth strategy. The RAG and Graph-RAG work that felt unglamorous is exactly what made the assistant trustworthy enough to scale.' },\n    { company: 'Intuit', role: 'Staff PM', period: '2021 to 2025', title: 'ML-powered recommendation & personalization engine', summary: 'Zero-to-one recommendation engine driving retention, cross-sell and personalized growth.', seed: 'What did she ship at Intuit?',\n      headline: [{ v: '$12M', l: 'MRR' }, { v: '$10M', l: 'from A/B testing' }, { v: '+20%', l: 'conversion' }],\n      situation: 'Retained B2C and B2B customers were under-monetized and getting generic experiences, and product teams lacked a rigorous way to test what actually moved revenue. The goal was to lift recurring revenue through personalization and disciplined experimentation.',\n      task: ['Build a zero-to-one ML recommendation engine for cross-sell and content', 'Improve personalized targeting and segmentation', 'Stand up rigorous experimentation to find what moves revenue', 'Protect experience quality and model trust while scaling'],\n      action: 'She prioritized ranking and retrieval quality and built a Data Enrichment platform capability to improve targeting, gating cross-sell on relevance rather than surface area. She designed A/B tests with statistical rigor and built early AI-testing frameworks to surface bias before scaling.',\n      result: [{ v: '$12M', l: 'MRR' }, { v: '$11M', l: 'hyper-personalization' }, { v: '$10M', l: 'from A/B testing' }, { v: '+20%', l: 'conversion' }, { v: '+19%', l: 'targeting' }, { v: '+15%', l: 'search' }],\n      learning: 'Personalization wins on relevance, not volume. Building the data-enrichment and bias-testing foundations early let us scale confidently instead of eroding trust for short-term lift.' },\n    { company: 'Intuit', role: 'Staff PM', period: '2021 to 2025', title: 'Automated invoice reminders : an AI agent for QuickBooks', summary: 'An agentic AI workflow that gets small businesses paid faster.', seed: 'What did she ship at Intuit?',\n      headline: [{ v: '5 days', l: 'faster payment' }, { v: '+10%', l: 'paid in full' }, { v: 'Reused', l: 'across SKUs' }],\n      situation: 'QuickBooks users chased unpaid invoices manually, and many were still paid late or not in full, straining small-business cash flow. The goal was to make getting paid effortless by letting AI handle the chasing end to end.',\n      task: ['Remove the manual effort of chasing overdue invoices', 'Use an AI agent to detect, draft, send and follow up automatically', 'Keep the owner in control with human-in-the-loop approval', 'Build a reusable workflow other SKUs could adopt'],\n      action: 'She designed an AI agent that monitors invoice status and decides when to act. GenAI drafts a personalized reminder the owner can approve or regenerate; if unpaid, the agent escalates with an adaptive follow-up and notifies the owner once payment lands. Built as a reusable pattern across product SKUs.',\n      result: [{ v: '5 days', l: 'faster payment' }, { v: '+10%', l: 'paid in full' }, { v: 'Cash flow', l: 'improved for SMBs' }, { v: 'Reused', l: 'across SKUs' }],\n      learning: \"Agentic AI shines when it takes a recurring chore off someone's plate while leaving a simple approval. Designing it as a reusable workflow is what let other teams adopt the pattern.\" },\n    { company: 'NetApp', role: 'PM, Enterprise e-Commerce', period: '2017 to 2021', title: 'Zero-to-one marketplace & AI chatbot for enterprise commerce', summary: 'Building a digital marketplace and AI support from scratch within an enterprise sales motion.', seed: 'Tell me about her NetApp marketplace',\n      headline: [{ v: '+215%', l: 'product evaluations' }, { v: '$500M', l: 'sales opportunities' }, { v: '+9 pts', l: 'NPS (46\u219255)' }],\n      situation: \"Enterprise prospects had no low-friction way to evaluate products, and support couldn't scale to the growing volume of interactions, all inside a traditionally sales-led organization. The goal was to prove a self-serve, AI-assisted motion could generate real pipeline, and to quantify the revenue gap to win executive buy-in.\",\n      task: ['Quantify the revenue gap and secure C-suite funding', 'Build a zero-to-one freemium trial marketplace for NetApp and partner products', 'Feed self-serve demand into the existing sales pipeline', 'Ship an AI chatbot reliable enough for operational scale'],\n      action: 'She quantified revenue gaps worth $380M and took business plans to the C-suite to fund the bet. She built the freemium marketplace from scratch spanning NetApp and partner products, integrated it with Salesforce so self-serve fed the sales motion, and shipped an AI chatbot at 95% intent accuracy across 10,000 daily interactions.',\n      result: [{ v: '+215%', l: 'product evaluations' }, { v: '$500M', l: 'sales opportunities' }, { v: '$35M+', l: 'pipeline from CRM' }, { v: '+33%', l: 'chatbot conversion' }, { v: '+9 pts', l: 'NPS (46\u219255)' }, { v: '95%', l: 'intent accuracy' }],\n      learning: 'In an enterprise sales culture, a self-serve product wins by feeding the sales motion rather than fighting it. Wiring the marketplace into CRM is what turned evaluations into a $500M pipeline.' }\n  ];\n\n  state = { view: 'chat', atWork: false, sessions: [], chatsOpen: false, openCase: null, audience: null, role: null, picking: 'l0', messages: [], thinking: false, thinkStep: 0, draft: '', leadOpen: false, leadRole: '', leadReason: 'A role or opportunity
